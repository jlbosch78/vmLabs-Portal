{% extends "layout.html" %}
{% block body %}

<div class="container-fluid py-4">
    <div class="row justify-content-center">
        <div class="col-md-8 col-lg-6">
            
            <div class="portal-card shadow-lg">
                <div class="auth-accent-line"></div>
                
                <div class="p-4 p-md-5">
                    <div class="d-flex align-items-center gap-3 mb-4">
                        <div class="auth-logo bg-primary shadow-sm">
                            <i class="bi bi-shield-lock-fill fs-4 text-white"></i>
                        </div>
                        <div>
                            <h2 class="fw-bold mb-0 text-primary">Actualizar Credenciales</h2>
                            <p class="text-muted mb-0">
                                Cambiando contraseña para: <strong class="text-dark">{{ target_user }}</strong>
                            </p>
                        </div>
                    </div>

                    <hr class="mb-4 opacity-10">

                    <form method="post" class="row g-4" id="passwordForm">
                        <div class="col-12">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="pw1" name="password" 
                                       placeholder="Nueva contraseña" required minlength="4">
                                <label for="pw1"><i class="bi bi-key me-2"></i>Nueva contraseña</label>
                            </div>
                        </div>
                        
                        <div class="col-12">
                            <div class="form-floating">
                                <input type="password" class="form-control" id="pw2" name="password2" 
                                       placeholder="Repetir contraseña" required minlength="4">
                                <label for="pw2"><i class="bi bi-check2-circle me-2"></i>Repetir nueva contraseña</label>
                            </div>
                            <div id="passwordHelp" class="form-text mt-2 text-danger d-none">
                                <i class="bi bi-exclamation-triangle"></i> Las contraseñas no coinciden.
                            </div>
                        </div>

                        <div class="col-12 mt-4 d-flex gap-2">
                            <button class="btn btn-primary px-4 py-2 shadow-sm d-flex align-items-center gap-2" type="submit">
                                <i class="bi bi-check-lg"></i>
                                <span>Actualizar ahora</span>
                            </button>
                            <a class="btn btn-outline-primary px-4 py-2" href="{{ url_for('users_admin') }}">
                                Cancelar
                            </a>
                        </div>
                    </form>
                </div>
            </div>
            
            <div class="mt-4 p-3 bg-light rounded-4 border text-center">
                <small class="text-muted">
                    <i class="bi bi-info-circle me-1"></i> 
                    Al cambiar la contraseña, el usuario deberá usar la nueva clave en su próximo inicio de sesión.
                </small>
            </div>

        </div>
    </div>
</div>

<style>
    /* Estilos específicos para armonizar con app.css */
    .form-floating > .form-control:focus ~ label {
        color: var(--red-600);
    }
    
    .auth-logo {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        background-color: var(--red-600) !important;
    }

    /* Mejora de los inputs para que se sientan más "seguros" */
    .form-control {
        background-color: #fcfdfe;
    }
</style>

<script>
    // Pequeña validación en el cliente para mejorar la experiencia
    (function() {
        const form = document.getElementById('passwordForm');
        const pw1 = document.getElementById('pw1');
        const pw2 = document.getElementById('pw2');
        const help = document.getElementById('passwordHelp');

        form.addEventListener('submit', function(e) {
            if (pw1.value !== pw2.value) {
                e.preventDefault();
                help.classList.remove('d-none');
                pw2.classList.add('is-invalid');
            }
        });

        [pw1, pw2].forEach(input => {
            input.addEventListener('input', () => {
                help.classList.add('d-none');
                pw2.classList.remove('is-invalid');
            });
        });
    })();
</script>

{% endblock %}
