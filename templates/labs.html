{% extends "layout.html" %}
{% block body %}
<h2 class="fw-bold mb-2 text-primary">Ver Labs</h2>
<p class="text-contrast-70 mb-4">Selecciona un laboratorio (carpeta).</p>

<div class="list-group">
  {% for lab in labs %}
    <a class="list-group-item list-group-item-action d-flex justify-content-between align-items-center"
       href="{{ url_for('lab_detail', lab_name=lab.name) }}">
      <span class="fw-medium">{{ lab.name }}</span>
      <span class="badge badge-portal">VMs: {{ lab.count }}</span>
    </a>
  {% else %}
    <div class="alert alert-warning">
      {{ empty_message if empty_message else ("No hay carpetas de lab " ~ prefix ~ ".") }}
    </div>
  {% endfor %}
</div>

<div class="mt-3">
  <a class="btn btn-outline-primary" href="{{ url_for('home') }}">← Volver</a>
</div>
{% endblock %}
