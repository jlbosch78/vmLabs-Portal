{% extends "layout.html" %}
{% set no_shell = true %}
{% block body %}

<div class="auth-wrap">
  <div class="auth-card portal-card shadow-sm">
    <div class="auth-header">
      <div class="auth-logo" aria-hidden="true">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none">
          <path d="M12 3l8 7v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V10l8-7Z"
                stroke="currentColor" stroke-width="1.8" stroke-linejoin="round"/>
          <path d="M9 22v-8h6v8" stroke="currentColor" stroke-width="1.8" stroke-linecap="round"/>
        </svg>
      </div>
      <div>
        <div class="auth-title">User Login</div>
        <div class="auth-subtitle text-contrast-70">Introduce tus credenciales del portal.</div>
      </div>
    </div>

    <form method="post" class="row g-3" autocomplete="off">
      <div class="col-12">
        <label class="form-label">Usuario</label>
        <input class="form-control" name="username" required>
      </div>
      <div class="col-12">
        <label class="form-label">Contraseña</label>
        <input class="form-control" type="password" name="password" required>
      </div>
      <div class="col-12">
        <button class="btn btn-primary w-100 auth-btn" type="submit">Login</button>
      </div>
    </form>
  </div>
</div>

{% endblock %}
