{% extends "layout.html" %}
{% block body %}

<h2 class="fw-bold mb-2 text-primary">Cambiar mi contraseña</h2>
<p class="text-contrast-70 mb-4">Actualiza tu contraseña de acceso al portal.</p>

<form method="post" class="row g-3">
  <div class="col-md-4">
    <label class="form-label">Contraseña actual</label>
    <input class="form-control" type="password" name="current" required>
  </div>
  <div class="col-md-4">
    <label class="form-label">Nueva contraseña</label>
    <input class="form-control" type="password" name="password" required>
  </div>
  <div class="col-md-4">
    <label class="form-label">Repetir nueva contraseña</label>
    <input class="form-control" type="password" name="password2" required>
  </div>

  <div class="col-12 d-flex gap-2">
    <button class="btn btn-primary" type="submit">Guardar</button>
    <a class="btn btn-outline-primary" href="{{ url_for('home') }}">← Volver</a>
  </div>
</form>

{% endblock %}
